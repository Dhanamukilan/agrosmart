<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – AgroSmart</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Custom CSS -->
    <style>
        :root {
            --primary-dark: #1B5E20;
            --primary-light: #66BB6A;
            --accent: #FFA000;
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d2b0e 0%, #1B5E20 50%, #2E7D32 100%);
            overflow: hidden;
            position: relative;
        }
        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(102,187,106,0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            animation: float-particle 20s infinite alternate;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,160,0,0.08) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation: float-particle 25s infinite alternate-reverse;
        }
        @keyframes float-particle {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.2); }
        }
        .admin-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .admin-card h2 {
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .admin-card p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
        }
        .input-group-text {
            background: transparent;
            border: 2px solid #eee;
            border-right: none;
            color: var(--primary-dark);
            border-radius: 14px 0 0 14px;
        }
        .form-control {
            border: 2px solid #eee;
            border-left: none;
            border-radius: 0 14px 14px 0;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 0.2rem rgba(102,187,106,0.15);
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--primary-light);
        }
        .btn-admin {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }
        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(27,94,32,0.35);
            color: white;
        }
        .btn-admin:disabled {
            opacity: 0.7;
            transform: none;
        }
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        .back-link a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .back-link a:hover {
            color: var(--primary-light);
        }
        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #999;
            transition: var(--transition);
        }
        .password-toggle:hover { color: var(--primary-dark); }
        .admin-alert {
            border-radius: 14px;
            font-size: 0.9rem;
            border: none;
        }
        .shield-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="admin-card animate__animated animate__fadeIn">
        <div class="text-center">
            <div class="shield-icon"><i class="fas fa-shield-alt"></i></div>
            <span class="admin-badge"><i class="fas fa-lock"></i> Admin Portal</span>
            <h2>Admin Access</h2>
            <p>Authorized personnel only</p>
        </div>

        <form id="adminLoginForm" novalidate>
            <!-- Bootstrap Alert -->
            <div id="adminAlert" class="alert admin-alert d-none animate__animated animate__fadeIn" role="alert"></div>

            <div class="mb-4">
                <label for="adminEmail" class="form-label">Admin Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                    <input type="email" class="form-control" id="adminEmail" placeholder="admin@agrosmart.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="adminPassword" class="form-label">Password</label>
                <div class="input-group position-relative">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input type="password" class="form-control" id="adminPassword" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" id="adminLoginBtn" class="btn btn-admin">
                <i class="fas fa-sign-in-alt me-2"></i>Access Dashboard
            </button>
        </form>

        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left me-1"></i> Back to User Login</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript: Admin login AJAX -->
    <script>
        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('adminPassword');
            const type = pwd.type === 'password' ? 'text' : 'password';
            pwd.type = type;
            this.classList.toggle('fa-eye-slash');
        });

        // Admin login form
        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('adminLoginBtn');
            const alertDiv = document.getElementById('adminAlert');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Verifying...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();

                if (result.success) {
                    alertDiv.className = 'alert admin-alert animate__animated animate__fadeIn alert-success';
                    alertDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i>' + result.message;
                    localStorage.setItem('agroSmartAdmin', 'true');
                    localStorage.setItem('agroSmartAdminEmail', email);
                    setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
                } else {
                    alertDiv.className = 'alert admin-alert animate__animated animate__shakeX alert-danger';
                    alertDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>' + result.message;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Access Dashboard';
                    btn.disabled = false;
                }
            } catch (error) {
                alertDiv.className = 'alert admin-alert animate__animated animate__fadeIn alert-danger';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Server error. Please try again.';
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Access Dashboard';
                btn.disabled = false;
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('agroSmartAdmin') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
